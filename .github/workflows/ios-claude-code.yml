name: "iOS: Claude Code (reusable)"

on:
  workflow_call:
    inputs:
      claude_model:
        description: "Claude model to use"
        required: false
        type: string
        default: "claude-sonnet-4-6"
      max_turns:
        description: "Max turns for Claude"
        required: false
        type: number
        default: 40
      allowed_bots:
        description: "Comma-separated list of bot logins allowed to trigger"
        required: true
        type: string
      git_user_name:
        description: "Git user name for commits"
        required: false
        type: string
        default: "claude-bot"
      git_user_email:
        description: "Git user email for commits"
        required: false
        type: string
        default: "claude-bot@users.noreply.github.com"
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: claude-code-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.user.login != 'claude[bot]' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const sameRepo = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            if (!sameRepo) {
              core.setFailed(`Refusing to auto-commit to fork: ${pr.head.repo.full_name}`);
              return;
            }
            core.setOutput('head_ref', pr.head.ref);

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Switch to local branch
        run: |
          git checkout -B ${{ steps.pr.outputs.head_ref }} origin/${{ steps.pr.outputs.head_ref }}
          git branch --set-upstream-to=origin/${{ steps.pr.outputs.head_ref }}

      - name: Configure git
        run: |
          git config user.name "${{ inputs.git_user_name }}"
          git config user.email "${{ inputs.git_user_email }}"

      - name: Debug trigger info
        run: |
          echo "Comment author: ${{ github.event.comment.user.login }}"
          echo "Comment author type: ${{ github.event.comment.user.type }}"
          echo "Allowed bots: ${{ inputs.allowed_bots }}"
          echo "Trigger phrase found: ${{ contains(github.event.comment.body, '@claude') }}"
          echo "PR branch: ${{ steps.pr.outputs.head_ref }}"
          echo "Model: ${{ inputs.claude_model }}"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@claude"
          allowed_bots: ${{ inputs.allowed_bots }}
          show_full_output: true
          claude_args: |
            --model ${{ inputs.claude_model }}
            --max-turns ${{ inputs.max_turns }}
            --dangerously-skip-permissions
