name: "iOS: CI Adapter Quality (reusable)"

on:
  workflow_call:
    inputs:
      workspace:
        description: "Xcode workspace name"
        required: true
        type: string
      test_scheme:
        description: "Xcode scheme for adapter tests"
        required: true
        type: string
      adapter_prefix:
        description: "Adapter name prefix for deprecated check (e.g. BidonAdapter, Appodeal)"
        required: true
        type: string
      adapters_dir:
        description: "Directory containing adapters"
        required: false
        type: string
        default: "Adapters"
      trigger_paths:
        description: "JSON array of paths that trigger this workflow"
        required: false
        type: string
        default: '["Adapters/**", "Podfile", "Podfile.lock"]'
      runner_labels:
        description: "JSON array of runner labels"
        required: false
        type: string
        default: '["self-hosted", "macOS", "ARM64", "xcode-16"]'
      adapter_regex:
        description: "Regex to detect adapter from file path"
        required: false
        type: string
        default: ""
      scripts_ref:
        description: "Git ref for dependamachine scripts"
        required: false
        type: string
        default: "main"

jobs:
  build:
    name: Build adapters
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 30

    outputs:
      build_status: ${{ steps.build.outputs.build_status }}
      changed_adapters: ${{ steps.detect_changed.outputs.adapters }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed adapters
        id: detect_changed
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin ${{ github.base_ref }} --depth=100 2>/dev/null || true
            MERGE_BASE=$(git merge-base origin/${{ github.base_ref }} HEAD 2>/dev/null || true)
            if [ -n "$MERGE_BASE" ]; then
              CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD 2>/dev/null \
                | grep -oE '^${{ inputs.adapters_dir }}/[^/]+' | sort -u | tr '\n' '|' | sed 's/|$//')
            else
              CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD 2>/dev/null \
                | grep -oE '^${{ inputs.adapters_dir }}/[^/]+' | sort -u | tr '\n' '|' | sed 's/|$//')
            fi
            echo "adapters=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "Changed adapters: $CHANGED"
          else
            echo "adapters=" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Xcode
        run: xcodebuild -version

      - name: CocoaPods repo update
        run: |
          set -o pipefail
          GEM_HOME=$(/opt/homebrew/opt/ruby@3.2/bin/gem env home)
          POD_BIN=$(command -v pod || echo "$GEM_HOME/bin/pod")
          "$POD_BIN" repo update 2>&1 | tee "$RUNNER_TEMP/pod_repo_update.log"

      - name: CocoaPods install
        run: |
          set -o pipefail
          GEM_HOME=$(/opt/homebrew/opt/ruby@3.2/bin/gem env home)
          POD_BIN=$(command -v pod || echo "$GEM_HOME/bin/pod")
          "$POD_BIN" install 2>&1 | tee "$RUNNER_TEMP/pod_install.log"

      - name: Build adapters
        id: build
        timeout-minutes: 20
        run: |
          set -eo pipefail

          echo "Selecting iOS Simulator runtime..."
          RUNTIME_ID=$(xcrun simctl list runtimes -j \
            | jq -r '[.runtimes[] | select((.availability?=="(available)" or .isAvailable==true) and (.identifier|test("iOS"))) | .identifier] | sort | last')
          if [ -z "${RUNTIME_ID:-}" ] || [ "$RUNTIME_ID" = "null" ]; then
            echo "No available iOS simulator runtime found"
            xcrun simctl list runtimes || true
            exit 1
          fi
          DEST_ID=$(xcrun simctl list devices -j \
            | jq -r --arg rid "$RUNTIME_ID" '((.devices[$rid] // []) | map(select(.isAvailable==true)) | map(.udid) | .[0])')
          if [ -z "${DEST_ID:-}" ] || [ "$DEST_ID" = "null" ]; then
            DEST_ID=$(xcrun simctl list devices -j \
              | jq -r '[.devices[] | .[] | select(.isAvailable==true) | .udid][0]')
          fi

          DD="$GITHUB_WORKSPACE/DerivedData"
          mkdir -p "$DD" build/reports || true

          echo "Building ${{ inputs.test_scheme }} scheme..."
          if command -v xcbeautify >/dev/null 2>&1; then
            xcodebuild build-for-testing \
              -workspace ${{ inputs.workspace }} \
              -scheme ${{ inputs.test_scheme }} \
              -sdk iphonesimulator \
              -destination "id=$DEST_ID" \
              -derivedDataPath "$DD" \
              2>&1 | tee build/reports/build_output.log | xcbeautify
          else
            xcodebuild build-for-testing \
              -workspace ${{ inputs.workspace }} \
              -scheme ${{ inputs.test_scheme }} \
              -sdk iphonesimulator \
              -destination "id=$DEST_ID" \
              -derivedDataPath "$DD" \
              2>&1 | tee build/reports/build_output.log
          fi

          BUILD_EXIT=$?
          if [ $BUILD_EXIT -eq 0 ]; then
            echo "build_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "build_status=failure" >> "$GITHUB_OUTPUT"
            exit $BUILD_EXIT
          fi

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/reports/build_output.log
          retention-days: 3

      - name: Job Summary
        if: always()
        run: |
          echo "## Build: ${{ inputs.test_scheme }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outputs.build_status }}" == "success" ]; then
            echo ":white_check_mark: Build successful" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: Build failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '<details><summary>Build output (last 50 lines)</summary>' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 build/reports/build_output.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No build output available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo '</details>' >> $GITHUB_STEP_SUMMARY
          fi

  deprecated-check:
    name: Deprecated API check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    if: always() && needs.build.result == 'success'

    outputs:
      has_deprecated: ${{ steps.deprecated.outputs.has_deprecated }}

    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
        continue-on-error: true

      - name: Check for deprecated warnings
        id: deprecated
        env:
          ADAPTER_PREFIX: ${{ inputs.adapter_prefix }}
          ADAPTERS_DIR: ${{ inputs.adapters_dir }}
          CHANGED_ADAPTERS: ${{ needs.build.outputs.changed_adapters }}
        run: |
          echo "Checking for deprecated warnings..."
          echo "Changed adapters: $CHANGED_ADAPTERS"

          if [ ! -f build_output.log ]; then
            echo "Build output not found, skipping"
            echo "has_deprecated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ALL_WARNINGS=$(grep -iE '\.(swift|m|mm):[0-9]+:[0-9]+: warning: .*deprecated' build_output.log \
            | grep -i "${ADAPTERS_DIR}/${ADAPTER_PREFIX}" || true)

          if [ -n "$CHANGED_ADAPTERS" ]; then
            ADAPTER_DEPRECATED=$(echo "$ALL_WARNINGS" | grep -E "($CHANGED_ADAPTERS)" || true)
            echo "Filtering by changed adapters: $CHANGED_ADAPTERS"
          else
            ADAPTER_DEPRECATED="$ALL_WARNINGS"
          fi

          if [ -n "$ADAPTER_DEPRECATED" ]; then
            echo "Found deprecated code warnings:"
            echo "$ADAPTER_DEPRECATED"
            echo "has_deprecated=true" >> "$GITHUB_OUTPUT"
            echo "$ADAPTER_DEPRECATED" > deprecated_warnings.txt
          else
            echo "No deprecated code warnings found in changed adapters"
            echo "has_deprecated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload deprecated warnings
        if: steps.deprecated.outputs.has_deprecated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deprecated-warnings
          path: deprecated_warnings.txt
          retention-days: 3

      - name: Fail if deprecated found
        if: steps.deprecated.outputs.has_deprecated == 'true'
        run: exit 1

      - name: Job Summary
        if: always()
        run: |
          echo "## Deprecated API Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deprecated.outputs.has_deprecated }}" == "true" ]; then
            echo ":x: Found deprecated code warnings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat deprecated_warnings.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo ":white_check_mark: No deprecated code found" >> $GITHUB_STEP_SUMMARY
          fi

  unit-tests:
    name: Unit tests
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 30
    needs: build
    if: always() && needs.build.result == 'success'

    outputs:
      test_status: ${{ steps.tests.outputs.test_status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout dependamachine scripts
        uses: actions/checkout@v4
        with:
          repository: bidon-io/dependamachine
          path: .dependamachine
          ref: ${{ inputs.scripts_ref }}
          sparse-checkout: ios/scripts

      - name: Verify Xcode
        run: xcodebuild -version

      - name: CocoaPods repo update
        run: |
          set -o pipefail
          GEM_HOME=$(/opt/homebrew/opt/ruby@3.2/bin/gem env home)
          POD_BIN=$(command -v pod || echo "$GEM_HOME/bin/pod")
          "$POD_BIN" repo update 2>&1 | tee "$RUNNER_TEMP/pod_repo_update.log"

      - name: CocoaPods install
        run: |
          set -o pipefail
          GEM_HOME=$(/opt/homebrew/opt/ruby@3.2/bin/gem env home)
          POD_BIN=$(command -v pod || echo "$GEM_HOME/bin/pod")
          "$POD_BIN" install 2>&1 | tee "$RUNNER_TEMP/pod_install.log"

      - name: Run adapter tests
        id: tests
        timeout-minutes: 20
        run: |
          set -eo pipefail

          RUNTIME_ID=$(xcrun simctl list runtimes -j \
            | jq -r '[.runtimes[] | select((.availability?=="(available)" or .isAvailable==true) and (.identifier|test("iOS"))) | .identifier] | sort | last')
          DEST_ID=$(xcrun simctl list devices -j \
            | jq -r --arg rid "$RUNTIME_ID" '((.devices[$rid] // []) | map(select(.isAvailable==true)) | map(.udid) | .[0])')
          if [ -z "${DEST_ID:-}" ] || [ "$DEST_ID" = "null" ]; then
            DEST_ID=$(xcrun simctl list devices -j \
              | jq -r '[.devices[] | .[] | select(.isAvailable==true) | .udid][0]')
          fi

          DD="$GITHUB_WORKSPACE/DerivedData"
          mkdir -p "$DD" Result build/reports || true

          if command -v xcbeautify >/dev/null 2>&1; then
            xcodebuild test \
              -workspace ${{ inputs.workspace }} \
              -scheme ${{ inputs.test_scheme }} \
              -sdk iphonesimulator \
              -destination "id=$DEST_ID" \
              -derivedDataPath "$DD" \
              -resultBundlePath Result/${{ inputs.test_scheme }}.xcresult \
              2>&1 | tee build/reports/test_output.log | xcbeautify || true
          else
            xcodebuild test \
              -workspace ${{ inputs.workspace }} \
              -scheme ${{ inputs.test_scheme }} \
              -sdk iphonesimulator \
              -destination "id=$DEST_ID" \
              -derivedDataPath "$DD" \
              -resultBundlePath Result/${{ inputs.test_scheme }}.xcresult \
              2>&1 | tee build/reports/test_output.log || true
          fi

          # Check actual test results from the log, not xcodebuild exit code.
          # xcodebuild can return non-zero due to simulator/TCC noise even when all tests pass.
          REAL_FAILURES=$(grep -oE "with [0-9]+ failures" build/reports/test_output.log \
            | awk '{sum += $2} END {print sum+0}')
          RUNNER_CRASHED=$(grep -c "Test runner never began executing tests" build/reports/test_output.log || true)

          if [ "${REAL_FAILURES:-0}" -gt 0 ] || [ "${RUNNER_CRASHED:-0}" -gt 0 ]; then
            echo "test_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "test_status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect test failures
        if: failure()
        env:
          ADAPTER_REGEX: ${{ inputs.adapter_regex }}
          ADAPTERS_ROOT: ${{ inputs.adapters_dir }}
        run: |
          ruby .dependamachine/ios/scripts/collect_adapter_errors_report.rb \
            --log build/reports/test_output.log \
            --out build/reports/test_failures.md \
            --adapters-root "$ADAPTERS_ROOT" \
            ${ADAPTER_REGEX:+--adapter-regex "$ADAPTER_REGEX"} || true

      - name: Upload test failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures
          path: |
            build/reports/test_output.log
            build/reports/test_failures.md
            build/reports/test_failures.txt
          retention-days: 3

      - name: Job Summary
        if: always()
        run: |
          echo "## Unit Tests: ${{ inputs.test_scheme }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outputs.test_status }}" == "success" ]; then
            echo ":white_check_mark: All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: Tests failed" >> $GITHUB_STEP_SUMMARY
          fi
