name: "iOS: Automation post pods update (reusable)"

on:
  workflow_call:
    inputs:
      ci_workflow_name:
        description: "Name of the CI workflow that triggers this (must match exactly)"
        required: true
        type: string
      branch_prefix:
        description: "Branch prefix for pod update branches"
        required: false
        type: string
        default: "chore/pod-"
      base_branch:
        description: "Base branch"
        required: false
        type: string
        default: "develop"
      adapters_dir:
        description: "Directory containing adapters"
        required: false
        type: string
        default: "Adapters"
      adapter_prefix:
        description: "Adapter name prefix"
        required: false
        type: string
        default: "BidonAdapter"
      workspace:
        description: "Xcode workspace name"
        required: true
        type: string
      adapter_scheme_prefix:
        description: "Scheme prefix for building individual adapters"
        required: false
        type: string
        default: "BidonAdapter"
      test_scheme:
        description: "Test scheme name"
        required: false
        type: string
        default: "AdaptersTests"
      tests_dir:
        description: "Directory containing test files"
        required: false
        type: string
        default: "Tests/AdaptersTests"
      review_team:
        description: "Team slug for review requests"
        required: false
        type: string
        default: ""
      adapter_regex:
        description: "Regex for adapter detection in error reports"
        required: false
        type: string
        default: ""
      scripts_ref:
        description: "Git ref for dependamachine scripts"
        required: false
        type: string
        default: "main"
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

concurrency:
  group: automation-pods-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  check-state:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.pr.outputs.should_run }}
      pr_number: ${{ steps.pr.outputs.number }}
      pr_branch: ${{ steps.pr.outputs.branch }}
      build_failed: ${{ steps.status.outputs.build_failed }}
      deprecated_failed: ${{ steps.status.outputs.deprecated_failed }}
      tests_failed: ${{ steps.status.outputs.tests_failed }}
      changelog_done: ${{ steps.labels.outputs.changelog_done }}
      build_attempted: ${{ steps.labels.outputs.build_attempted }}
      deprecated_attempted: ${{ steps.labels.outputs.deprecated_attempted }}
      tests_attempted: ${{ steps.labels.outputs.tests_attempted }}
      adapters_json: ${{ steps.meta.outputs.adapters_json }}
      pod: ${{ steps.meta.outputs.pod }}
      from_version: ${{ steps.meta.outputs.from_version }}
      to_version: ${{ steps.meta.outputs.to_version }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get PR info
        id: pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const run = context.payload.workflow_run;
            const prNumber = run.pull_requests[0]?.number;
            const prBranch = run.head_branch;
            if (!prNumber) {
              console.log('Could not determine PR number');
              core.setOutput('should_run', 'false');
              return;
            }
            console.log(`PR #${prNumber}, Branch: ${prBranch}`);
            core.setOutput('should_run', 'true');
            core.setOutput('number', prNumber);
            core.setOutput('branch', prBranch);

      - name: Check labels
        id: labels
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: ${{ steps.pr.outputs.number }}
            });
            const labels = (pr.labels || []).map(l => l.name);
            console.log(`Labels: ${labels.join(', ')}`);
            core.setOutput('changelog_done', labels.includes('bot:changelog-updated') ? 'true' : 'false');
            core.setOutput('build_attempted', labels.includes('bot:build-attempted') ? 'true' : 'false');
            core.setOutput('deprecated_attempted', labels.includes('bot:deprecated-attempted') ? 'true' : 'false');
            core.setOutput('tests_attempted', labels.includes('bot:tests-attempted') ? 'true' : 'false');

      - name: Check CI job statuses
        id: status
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const runId = context.payload.workflow_run.id;
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner, repo: context.repo.repo, run_id: runId
            });
            let buildFailed = false, deprecatedFailed = false, testsFailed = false;
            for (const job of jobs.jobs) {
              console.log(`Job: ${job.name} - ${job.conclusion}`);
              if (job.name.includes('Build') && job.conclusion === 'failure') buildFailed = true;
              if (job.name.includes('Deprecated') && job.conclusion === 'failure') deprecatedFailed = true;
              if (job.name.includes('Unit tests') && job.conclusion === 'failure') testsFailed = true;
            }
            core.setOutput('build_failed', buildFailed ? 'true' : 'false');
            core.setOutput('deprecated_failed', deprecatedFailed ? 'true' : 'false');
            core.setOutput('tests_failed', testsFailed ? 'true' : 'false');

      - name: Parse PR metadata
        id: meta
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: ${{ steps.pr.outputs.number }}
            });
            const metaMatch = pr.body?.match(/<!-- build-metadata\n([\s\S]*?)\n-->/);
            let meta = {};
            if (metaMatch) {
              try { meta = JSON.parse(metaMatch[1]); } catch (e) {
                core.warning(`Failed to parse build-metadata: ${e.message}`);
              }
            }
            core.setOutput('adapters_json', JSON.stringify(meta.adapters || []));
            core.setOutput('pod', meta.pod || '');
            core.setOutput('from_version', meta.from || '');
            core.setOutput('to_version', meta.to || '');

      - name: Request team review
        if: steps.pr.outputs.should_run == 'true' && inputs.review_team != ''
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: ${{ steps.pr.outputs.number }},
                team_reviewers: ['${{ inputs.review_team }}']
              });
            } catch (e) { console.log(`Could not request team review: ${e.message}`); }

  trigger-fix-build:
    needs: [check-state]
    if: |
      needs.check-state.outputs.should_run == 'true' &&
      needs.check-state.outputs.build_failed == 'true' &&
      needs.check-state.outputs.build_attempted != 'true' &&
      needs.check-state.outputs.adapters_json != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-state.outputs.pr_branch }}

      - name: Checkout dependamachine
        uses: actions/checkout@v4
        with:
          repository: bidon-io/dependamachine
          path: .dependamachine
          ref: ${{ inputs.scripts_ref }}
          sparse-checkout: |
            ios/scripts
            ios/claude-prompts

      - name: Download build output
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const runId = context.payload.workflow_run.id;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner, repo: context.repo.repo, run_id: runId
            });
            const artifact = data.artifacts.find(a => a.name === 'build-output');
            if (artifact) {
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner, repo: context.repo.repo,
                artifact_id: artifact.id, archive_format: 'zip'
              });
              fs.writeFileSync('build-output.zip', Buffer.from(download.data));
            }

      - name: Extract and collect errors
        id: collect
        env:
          ADAPTERS_JSON: ${{ needs.check-state.outputs.adapters_json }}
          ADAPTER_REGEX: ${{ inputs.adapter_regex }}
          ADAPTERS_ROOT: ${{ inputs.adapters_dir }}
        run: |
          mkdir -p artifacts
          unzip -o build-output.zip -d artifacts || true
          if [ -f "artifacts/build_output.log" ]; then
            ruby .dependamachine/ios/scripts/collect_adapter_errors_report.rb \
              --log artifacts/build_output.log \
              --out /tmp/build_errors.md \
              --adapters-root "$ADAPTERS_ROOT" \
              ${ADAPTER_REGEX:+--adapter-regex "$ADAPTER_REGEX"} \
              --adapters "$(echo "$ADAPTERS_JSON" | jq -r 'join(",")')" || true
          fi
          if [ -f /tmp/build_errors.md ] && [ -s /tmp/build_errors.md ]; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render prompt
        if: steps.collect.outputs.has_issues == 'true'
        env:
          ADAPTERS_JSON: ${{ needs.check-state.outputs.adapters_json }}
          POD: ${{ needs.check-state.outputs.pod }}
          ADAPTERS_DIR: ${{ inputs.adapters_dir }}
          WORKSPACE: ${{ inputs.workspace }}
          ADAPTER_SCHEME_PREFIX: ${{ inputs.adapter_scheme_prefix }}
        run: |
          ADAPTER_LIST=$(echo "$ADAPTERS_JSON" | jq -r '.[] | "- `'"$ADAPTERS_DIR"'/" + . + "/`"')
          [ -z "$ADAPTER_LIST" ] && ADAPTER_LIST="- \`${ADAPTERS_DIR}/\`"
          ERRORS=$(cat /tmp/build_errors.md 2>/dev/null || echo "Build errors detected but report could not be read.")
          RELEASE_NOTES="N/A"
          if [ -f .github/release-notes-urls.json ]; then
            ROOT_POD=$(echo "$POD" | cut -d'/' -f1)
            URL=$(jq -r --arg pod "$ROOT_POD" '.[$pod] // empty' .github/release-notes-urls.json 2>/dev/null || true)
            [ -n "$URL" ] && RELEASE_NOTES="- **${ROOT_POD}**: ${URL}"
          fi
          PROMPT=$(cat .dependamachine/ios/claude-prompts/fix-build.md)
          PROMPT="${PROMPT//\{\{ADAPTERS\}\}/$ADAPTER_LIST}"
          PROMPT="${PROMPT//\{\{ISSUES\}\}/$ERRORS}"
          PROMPT="${PROMPT//\{\{RELEASE_NOTES\}\}/$RELEASE_NOTES}"
          PROMPT="${PROMPT//\{\{ADAPTERS_DIR\}\}/$ADAPTERS_DIR}"
          PROMPT="${PROMPT//\{\{WORKSPACE\}\}/$WORKSPACE}"
          PROMPT="${PROMPT//\{\{ADAPTER_SCHEME_PREFIX\}\}/$ADAPTER_SCHEME_PREFIX}"
          echo "$PROMPT" > /tmp/prompt.txt

      - name: Post @claude comment
        if: steps.collect.outputs.has_issues == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const prompt = fs.readFileSync('/tmp/prompt.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.check-state.outputs.pr_number }},
              body: `@claude\n\n${prompt}`.slice(0, 60000)
            });

      - name: Add attempted label
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const label = { name: 'bot:build-attempted', color: 'd73a4a', description: 'Claude attempted to fix build errors' };
            try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name }); }
            catch (e) { try { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label }); } catch (e2) {} }
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.check-state.outputs.pr_number }},
              labels: [label.name]
            });

  trigger-fix-deprecated:
    needs: [check-state]
    if: |
      needs.check-state.outputs.should_run == 'true' &&
      needs.check-state.outputs.build_failed != 'true' &&
      needs.check-state.outputs.deprecated_failed == 'true' &&
      needs.check-state.outputs.deprecated_attempted != 'true' &&
      needs.check-state.outputs.adapters_json != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-state.outputs.pr_branch }}

      - name: Checkout dependamachine
        uses: actions/checkout@v4
        with:
          repository: bidon-io/dependamachine
          path: .dependamachine
          ref: ${{ inputs.scripts_ref }}
          sparse-checkout: ios/claude-prompts

      - name: Download deprecated warnings
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const runId = context.payload.workflow_run.id;
            console.log(`Listing artifacts for run_id: ${runId}`);
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner, repo: context.repo.repo, run_id: runId
            });
            console.log(`Found ${data.artifacts.length} artifact(s): ${data.artifacts.map(a => a.name).join(', ')}`);
            const artifact = data.artifacts.find(a => a.name === 'deprecated-warnings');
            if (artifact) {
              console.log(`Downloading artifact id=${artifact.id}`);
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner, repo: context.repo.repo,
                artifact_id: artifact.id, archive_format: 'zip'
              });
              fs.writeFileSync('deprecated-warnings.zip', Buffer.from(download.data));
              console.log('deprecated-warnings.zip written successfully');
            } else {
              console.log('Artifact "deprecated-warnings" not found in this run');
            }

      - name: Extract and collect warnings
        id: collect
        run: |
          mkdir -p artifacts
          unzip -o deprecated-warnings.zip -d artifacts || true
          if [ -f "artifacts/deprecated_warnings.txt" ] && [ -s "artifacts/deprecated_warnings.txt" ]; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render prompt
        if: steps.collect.outputs.has_issues == 'true'
        env:
          ADAPTERS_JSON: ${{ needs.check-state.outputs.adapters_json }}
          POD: ${{ needs.check-state.outputs.pod }}
          ADAPTERS_DIR: ${{ inputs.adapters_dir }}
          WORKSPACE: ${{ inputs.workspace }}
        run: |
          ADAPTER_LIST=$(echo "$ADAPTERS_JSON" | jq -r '.[] | "- `'"$ADAPTERS_DIR"'/" + . + "/`"')
          [ -z "$ADAPTER_LIST" ] && ADAPTER_LIST="- \`${ADAPTERS_DIR}/\`"
          WARNINGS=$(cat artifacts/deprecated_warnings.txt 2>/dev/null || echo "(could not read deprecated warnings)")
          ISSUES=$(printf '```text\n%s\n```' "$WARNINGS")
          RELEASE_NOTES="N/A"
          if [ -f .github/release-notes-urls.json ]; then
            ROOT_POD=$(echo "$POD" | cut -d'/' -f1)
            URL=$(jq -r --arg pod "$ROOT_POD" '.[$pod] // empty' .github/release-notes-urls.json 2>/dev/null || true)
            [ -n "$URL" ] && RELEASE_NOTES="- **${ROOT_POD}**: ${URL}"
          fi
          PROMPT=$(cat .dependamachine/ios/claude-prompts/fix-deprecated.md)
          PROMPT="${PROMPT//\{\{ADAPTERS\}\}/$ADAPTER_LIST}"
          PROMPT="${PROMPT//\{\{ISSUES\}\}/$ISSUES}"
          PROMPT="${PROMPT//\{\{RELEASE_NOTES\}\}/$RELEASE_NOTES}"
          PROMPT="${PROMPT//\{\{ADAPTERS_DIR\}\}/$ADAPTERS_DIR}"
          echo "$PROMPT" > /tmp/prompt.txt

      - name: Post @claude comment
        if: steps.collect.outputs.has_issues == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const prompt = fs.readFileSync('/tmp/prompt.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.check-state.outputs.pr_number }},
              body: `@claude\n\n${prompt}`.slice(0, 60000)
            });

      - name: Add attempted label
        if: steps.collect.outputs.has_issues == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const label = { name: 'bot:deprecated-attempted', color: '0e8a16', description: 'Claude attempted to fix deprecated warnings' };
            try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name }); }
            catch (e) { try { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label }); } catch (e2) {} }
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.check-state.outputs.pr_number }},
              labels: [label.name]
            });

  trigger-fix-tests:
    needs: [check-state]
    if: |
      needs.check-state.outputs.should_run == 'true' &&
      needs.check-state.outputs.build_failed != 'true' &&
      needs.check-state.outputs.deprecated_failed != 'true' &&
      needs.check-state.outputs.tests_failed == 'true' &&
      needs.check-state.outputs.tests_attempted != 'true' &&
      needs.check-state.outputs.adapters_json != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-state.outputs.pr_branch }}

      - name: Checkout dependamachine
        uses: actions/checkout@v4
        with:
          repository: bidon-io/dependamachine
          path: .dependamachine
          ref: ${{ inputs.scripts_ref }}
          sparse-checkout: |
            ios/scripts
            ios/claude-prompts

      - name: Download test failures
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const runId = context.payload.workflow_run.id;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner, repo: context.repo.repo, run_id: runId
            });
            const artifact = data.artifacts.find(a => a.name === 'test-failures');
            if (artifact) {
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner, repo: context.repo.repo,
                artifact_id: artifact.id, archive_format: 'zip'
              });
              fs.writeFileSync('test-failures.zip', Buffer.from(download.data));
            }

      - name: Extract and collect failures
        id: collect
        env:
          ADAPTERS_JSON: ${{ needs.check-state.outputs.adapters_json }}
          ADAPTER_REGEX: ${{ inputs.adapter_regex }}
          ADAPTERS_ROOT: ${{ inputs.adapters_dir }}
        run: |
          mkdir -p artifacts
          unzip -o test-failures.zip -d artifacts || true
          if [ -f "artifacts/build/reports/test_failures.md" ] && [ -s "artifacts/build/reports/test_failures.md" ]; then
            cp artifacts/build/reports/test_failures.md /tmp/test_errors.md
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          elif [ -f "artifacts/build/reports/test_output.log" ]; then
            ruby .dependamachine/ios/scripts/collect_adapter_errors_report.rb \
              --log artifacts/build/reports/test_output.log \
              --out /tmp/test_errors.md \
              --adapters-root "$ADAPTERS_ROOT" \
              ${ADAPTER_REGEX:+--adapter-regex "$ADAPTER_REGEX"} \
              --adapters "$(echo "$ADAPTERS_JSON" | jq -r 'join(",")')" || true
            if [ -s /tmp/test_errors.md ]; then
              echo "has_issues=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_issues=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render prompt
        if: steps.collect.outputs.has_issues == 'true'
        env:
          ADAPTERS_JSON: ${{ needs.check-state.outputs.adapters_json }}
          POD: ${{ needs.check-state.outputs.pod }}
          ADAPTERS_DIR: ${{ inputs.adapters_dir }}
          TESTS_DIR: ${{ inputs.tests_dir }}
          WORKSPACE: ${{ inputs.workspace }}
          TEST_SCHEME: ${{ inputs.test_scheme }}
        run: |
          ADAPTER_LIST=$(echo "$ADAPTERS_JSON" | jq -r '.[] | "- `'"$ADAPTERS_DIR"'/" + . + "/`"')
          [ -z "$ADAPTER_LIST" ] && ADAPTER_LIST="- \`${ADAPTERS_DIR}/\`"
          ERRORS=$(cat /tmp/test_errors.md 2>/dev/null || echo "Test failures detected but report could not be read.")
          RELEASE_NOTES="N/A"
          if [ -f .github/release-notes-urls.json ]; then
            ROOT_POD=$(echo "$POD" | cut -d'/' -f1)
            URL=$(jq -r --arg pod "$ROOT_POD" '.[$pod] // empty' .github/release-notes-urls.json 2>/dev/null || true)
            [ -n "$URL" ] && RELEASE_NOTES="- **${ROOT_POD}**: ${URL}"
          fi
          PROMPT=$(cat .dependamachine/ios/claude-prompts/fix-tests.md)
          PROMPT="${PROMPT//\{\{ADAPTERS\}\}/$ADAPTER_LIST}"
          PROMPT="${PROMPT//\{\{ISSUES\}\}/$ERRORS}"
          PROMPT="${PROMPT//\{\{RELEASE_NOTES\}\}/$RELEASE_NOTES}"
          PROMPT="${PROMPT//\{\{ADAPTERS_DIR\}\}/$ADAPTERS_DIR}"
          PROMPT="${PROMPT//\{\{TESTS_DIR\}\}/$TESTS_DIR}"
          PROMPT="${PROMPT//\{\{WORKSPACE\}\}/$WORKSPACE}"
          PROMPT="${PROMPT//\{\{TEST_SCHEME\}\}/$TEST_SCHEME}"
          echo "$PROMPT" > /tmp/prompt.txt

      - name: Post @claude comment
        if: steps.collect.outputs.has_issues == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const prompt = fs.readFileSync('/tmp/prompt.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.check-state.outputs.pr_number }},
              body: `@claude\n\n${prompt}`.slice(0, 60000)
            });

      - name: Add attempted label
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const label = { name: 'bot:tests-attempted', color: '5319e7', description: 'Claude attempted to fix test failures' };
            try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name }); }
            catch (e) { try { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label }); } catch (e2) {} }
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.check-state.outputs.pr_number }},
              labels: [label.name]
            });

  trigger-changelog:
    needs: [check-state, trigger-fix-build, trigger-fix-deprecated, trigger-fix-tests]
    if: |
      always() &&
      needs.check-state.outputs.should_run == 'true' &&
      needs.check-state.outputs.changelog_done != 'true' &&
      needs.check-state.outputs.build_failed != 'true' &&
      needs.check-state.outputs.deprecated_failed != 'true' &&
      needs.check-state.outputs.tests_failed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-state.outputs.pr_branch }}
          fetch-depth: 0

      - name: Checkout dependamachine
        uses: actions/checkout@v4
        with:
          repository: bidon-io/dependamachine
          path: .dependamachine
          ref: ${{ inputs.scripts_ref }}
          sparse-checkout: ios/claude-prompts

      - name: Get version changes
        id: versions
        env:
          ADAPTERS_JSON: ${{ needs.check-state.outputs.adapters_json }}
          POD: ${{ needs.check-state.outputs.pod }}
          FROM_VERSION: ${{ needs.check-state.outputs.from_version }}
          TO_VERSION: ${{ needs.check-state.outputs.to_version }}
        run: |
          ADAPTERS=$(echo "$ADAPTERS_JSON" | jq -r 'join(", ")' 2>/dev/null || echo "unknown")
          VERSION_CHANGES="- **${POD}**: ${FROM_VERSION:-unknown} -> ${TO_VERSION:-unknown}"
          RELEASE_NOTES="N/A"
          if [ -f .github/release-notes-urls.json ]; then
            ROOT_POD=$(echo "$POD" | cut -d'/' -f1)
            URL=$(jq -r --arg pod "$ROOT_POD" '.[$pod] // empty' .github/release-notes-urls.json 2>/dev/null || true)
            [ -n "$URL" ] && RELEASE_NOTES="- **${ROOT_POD}**: ${URL}"
          fi
          echo "$ADAPTERS" > /tmp/adapters_list.txt
          echo "$VERSION_CHANGES" > /tmp/version_changes.txt
          echo "$RELEASE_NOTES" > /tmp/release_notes.txt
          if [ -n "$ADAPTERS" ] && [ "$ADAPTERS" != "unknown" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine AI fixes
        id: ai-fixes
        env:
          BUILD_ATTEMPTED: ${{ needs.check-state.outputs.build_attempted }}
          DEPRECATED_ATTEMPTED: ${{ needs.check-state.outputs.deprecated_attempted }}
          TESTS_ATTEMPTED: ${{ needs.check-state.outputs.tests_attempted }}
        run: |
          AI_FIXES=""
          [ "$DEPRECATED_ATTEMPTED" == "true" ] && AI_FIXES="${AI_FIXES}- deprecated-fix: yes\n"
          [ "$BUILD_ATTEMPTED" == "true" ] && AI_FIXES="${AI_FIXES}- build-fix: yes\n"
          [ "$TESTS_ATTEMPTED" == "true" ] && AI_FIXES="${AI_FIXES}- tests-fix: yes\n"
          [ -z "$AI_FIXES" ] && AI_FIXES="None"
          echo -e "$AI_FIXES" > /tmp/ai_fixes.txt

      - name: Render prompt
        if: steps.versions.outputs.has_changes == 'true'
        env:
          ADAPTERS_DIR: ${{ inputs.adapters_dir }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          PROMPT=$(cat .dependamachine/ios/claude-prompts/update-changelog.md)
          ADAPTERS=$(cat /tmp/adapters_list.txt)
          VERSION_CHANGES=$(cat /tmp/version_changes.txt)
          RELEASE_NOTES=$(cat /tmp/release_notes.txt)
          AI_FIXES=$(cat /tmp/ai_fixes.txt)
          PROMPT="${PROMPT//\{\{ADAPTERS\}\}/$ADAPTERS}"
          PROMPT="${PROMPT//\{\{VERSION_CHANGES\}\}/$VERSION_CHANGES}"
          PROMPT="${PROMPT//\{\{RELEASE_NOTES\}\}/$RELEASE_NOTES}"
          PROMPT="${PROMPT//\{\{AI_FIXES\}\}/$AI_FIXES}"
          PROMPT="${PROMPT//\{\{BASE_BRANCH\}\}/$BASE_BRANCH}"
          PROMPT="${PROMPT//\{\{ADAPTERS_DIR\}\}/$ADAPTERS_DIR}"
          echo "$PROMPT" > /tmp/prompt.txt

      - name: Post @claude comment
        if: steps.versions.outputs.has_changes == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const prompt = fs.readFileSync('/tmp/prompt.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.check-state.outputs.pr_number }},
              body: `@claude\n\n${prompt}`
            });

      - name: Add changelog label
        if: steps.versions.outputs.has_changes == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const label = { name: 'bot:changelog-updated', color: '0366d6', description: 'CHANGELOG automatically updated' };
            try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name }); }
            catch (e) { try { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label }); } catch (e2) {} }
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ needs.check-state.outputs.pr_number }},
              labels: [label.name]
            });

  summary:
    needs: [check-state, trigger-changelog, trigger-fix-build, trigger-fix-deprecated, trigger-fix-tests]
    if: always() && needs.check-state.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Job Summary
        run: |
          echo "## Automation Post Pods Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PR Number | #${{ needs.check-state.outputs.pr_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Failed | ${{ needs.check-state.outputs.build_failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deprecated Failed | ${{ needs.check-state.outputs.deprecated_failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Failed | ${{ needs.check-state.outputs.tests_failed }} |" >> $GITHUB_STEP_SUMMARY
